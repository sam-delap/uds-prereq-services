apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: "###ZARF_VAR_ACME_EMAIL###"
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # DNS-01 solver is hardcoded to Cloudflare. Consumers using another DNS
      # provider should opt out of the cert-manager-config component and supply
      # their own ClusterIssuers.
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "###ZARF_VAR_DNS_ZONE###"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "###ZARF_VAR_ACME_EMAIL###"
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # DNS-01 solver is hardcoded to Cloudflare (see staging issuer above).
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "###ZARF_VAR_DNS_ZONE###"
